name: Deploy Production Flow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "Tracing deploy.sh..."
            TRACE_FILE="/tmp/deploy_trace_mycircle.txt"
            bash -x /var/www/mistyvisuals-mycircle/deploy.sh > "$TRACE_FILE" 2>&1 || true
            curl -s -H "Title: Deploy Trace MyCircle" -T "$TRACE_FILE" https://ntfy.sh/mistyvisuals-deploy-debug || true
