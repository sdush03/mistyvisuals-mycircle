name: Deploy Production Flow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cat << 'EOF' > /var/www/mistyvisuals-mycircle/backend/check_photos.js
            const { Client } = require('pg');
            const fs = require('fs');
            const path = require('path');

            const envPath = '/var/www/mistyvisuals-mycircle/backend/.env';
            let connectionString = process.env.DATABASE_URL;

            if (!connectionString && fs.existsSync(envPath)) {
              const envContent = fs.readFileSync(envPath, 'utf8');
              const env = {};
              envContent.split('\n').forEach(line => {
                const trimmed = line.trim();
                if (trimmed && !trimmed.startsWith('#')) {
                  const parts = trimmed.split('=');
                  const key = parts[0].trim();
                  const val = parts.slice(1).join('=').trim().replace(/(^['"]|['"]$)/g, '');
                  if (key) env[key] = val;
                }
              });
              const user = env.DB_USER || '';
              const password = env.DB_PASSWORD || '';
              const host = env.DB_HOST || 'localhost';
              const port = env.DB_PORT || '5432';
              const name = env.DB_NAME || '';
              const auth = password ? `${user}:${password}` : user;
              connectionString = `postgresql://${auth}@${host}:${port}/${name}`;
            }

            async function run() {
              console.log("Connecting to:", connectionString.replace(/:[^:@]+@/, ':***@'));
              const client = new Client({ connectionString });
              await client.connect();

              try {
                // 1. Get guest counts by event and access level
                const guestsRes = await client.query(`
                  SELECT event_id, has_full_access, COUNT(*)
                  FROM guests
                  GROUP BY event_id, has_full_access
                  ORDER BY event_id, has_full_access
                `);
                console.log("\n--- Guest Access Levels ---");
                console.table(guestsRes.rows);

                // 2. Fetch some guests details
                const guestDetailsRes = await client.query(`
                  SELECT id, event_id, email, name, phone_number, has_full_access, is_blocked
                  FROM guests
                  LIMIT 20
                `);
                console.log("\n--- Guest Details (Sample) ---");
                console.table(guestDetailsRes.rows);

              } catch (err) {
                console.error(err);
              } finally {
                await client.end();
              }
            }

            run();
            EOF
            node /var/www/mistyvisuals-mycircle/backend/check_photos.js
            rm -f /var/www/mistyvisuals-mycircle/backend/check_photos.js
            set -a
            source /var/www/mistyvisuals-mycircle/backend/.env 2>/dev/null || true
            set +a
            bash /var/www/mistyvisuals-mycircle/deploy.sh || {
              echo "deploy.sh failed!"
              LOG_FILE=$(ls -t /tmp/deploy-logs-mycircle-*/deploy_*.log 2>/dev/null | head -n 1 || true)
              if [[ -f "$LOG_FILE" ]]; then
                curl -s -H "Title: Deploy Log MyCircle" -d "$(tail -n 100 "$LOG_FILE")" https://ntfy.sh/mistyvisuals-deploy-debug || true
              else
                curl -s -d "Deploy failed. No log file found!" https://ntfy.sh/mistyvisuals-deploy-debug || true
              fi
              exit 1
            }
