name: Deploy Production Flow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Server Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "Scanning /var/www..."
            SCAN_OUT=$(find /var/www -maxdepth 2 2>&1 || true)
            curl -s -H "Title: Remote Scan" -d "$SCAN_OUT" https://ntfy.sh/mistyvisuals-deploy-debug || true
